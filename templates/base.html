<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ profile.site.description }}">
    <title>{{ page_title }}</title>
    <script>
      const savedTheme = localStorage.getItem("theme");
      const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.dataset.theme = savedTheme || preferredTheme;
    </script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
    <script src="{{ url_for('static', path='/js/theme.js') }}" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ url_for('index') }}" aria-label="Home">
        <span class="brand-mark">S</span>
        <span>{{ profile.person.name }}</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="{{ url_for('index') }}#about">About</a>
        <a href="{{ url_for('index') }}#experience">Experience</a>
        <a href="{{ url_for('index') }}#teaching">Teaching</a>
        <a href="{{ url_for('index') }}#research">Research</a>
        <a href="{{ url_for('index') }}#projects">Projects</a>
        <a href="{{ url_for('index') }}#skills">Skills</a>
        <a href="{{ url_for('index') }}#contact">Contact</a>
        <button class="theme-toggle" type="button" aria-label="Switch color theme" data-theme-toggle>
          <span data-theme-label>Theme</span>
        </button>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>{{ profile.person.name }} · AI-focused backend developer</p>
      <div class="footer-links">
        <a href="{{ profile.person.github }}">GitHub</a>
        <a href="{{ profile.person.linkedin }}">LinkedIn</a>
        <a href="mailto:{{ profile.person.email }}">{{ profile.person.email }}</a>
      </div>
    </footer>
  </body>
</html>
